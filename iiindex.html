<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Popover Project</title>
  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="p-4">

  <h2>Bootstrap Popover Project</h2>

  <!-- 1. Basic Popover -->
  <h4>1. Basic Popover</h4>
  <button type="button" class="btn btn-primary" data-toggle="popover" title="Popover Title" data-content="This is a basic popover.">Click Me</button>

  <!-- 2. Popover Positions -->
  <h4>2. Popover Positions</h4>
  <button type="button" class="btn btn-success" data-toggle="popover" data-placement="top" title="Top Popover" data-content="Popover on top">Top</button>
  <button type="button" class="btn btn-info" data-toggle="popover" data-placement="bottom" title="Bottom Popover" data-content="Popover on bottom">Bottom</button>
  <button type="button" class="btn btn-warning" data-toggle="popover" data-placement="left" title="Left Popover" data-content="Popover on left">Left</button>
  <button type="button" class="btn btn-danger" data-toggle="popover" data-placement="right" title="Right Popover" data-content="Popover on right">Right</button>

  <!-- 3. Popover on Link -->
  <h4>3. Popover on Link</h4>
  <a href="#" tabindex="0" class="btn btn-outline-dark" role="button" data-toggle="popover" title="Link Popover" data-content="Popover on a link">Click Link</a>

  <!-- 4. HTML Popover -->
  <h4>4. HTML Popover</h4>
  <button type="button" class="btn btn-secondary" data-toggle="popover" data-html="true" title="HTML Popover" data-content="<b>Bold</b> and <i>italic</i> text inside popover">HTML Popover</button>

  <!-- 5. Trigger Types -->
  <h4>5. Trigger Types</h4>
  <button type="button" class="btn btn-outline-primary" data-toggle="popover" data-trigger="hover" title="Hover Popover" data-content="Shown on hover">Hover Me</button>
  <button type="button" class="btn btn-outline-success" data-toggle="popover" data-trigger="focus" title="Focus Popover" data-content="Shown on focus">Focus Me</button>
  <button type="button" class="btn btn-outline-danger" data-toggle="popover" data-trigger="click" title="Click Popover" data-content="Shown on click">Click Me</button>

  <!-- 6. Delay Popover -->
  <h4>6. Delay Popover</h4>
  <button type="button" class="btn btn-outline-info" data-toggle="popover" data-delay='{"show":1000,"hide":500}' title="Delayed Popover" data-content="This popover appears with delay">Hover with Delay</button>

  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Enable all popovers
    $(function () {
      $('[data-toggle="popover"]').popover()
    })
  </script>
</body>
</html>
